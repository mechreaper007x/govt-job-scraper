name: Daily Job Portal Check

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC (11:30 AM IST) daily
  workflow_dispatch:      # Allows manual trigger for testing

# contents: write  -> commit state.json/report back to the repo
# pages: write + id-token: write -> deploy the dashboard to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel an in-progress run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run all job scrapers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          SCRAPER_PDF_SCAN: '1'
          SCALE_CRAWL: '1'
          SPA_FALLBACK: '1'
        run: python -m scraper.main --scale-all

      - name: Generate PDF Report
        run: python generate_pdf.py

      - name: Upload scraper output (shared with deploy job)
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-report
          path: |
            jobs_report.pdf
            scraped_jobs.json
          retention-days: 7

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset origin/main
          git add state.json scraped_jobs.json jobs_report.pdf all_relevant_jobs.md || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update state and reports [skip ci]" && git push origin main)

  # ── Publish the web_ui dashboard to GitHub Pages ────────────────────────
  # Assembles the static site (web_ui/ + fresh scraped_jobs.json + PDF) and
  # deploys it. Runs in the same workflow as the scrape so it always ships
  # the data just produced (the scrape's commit carries [skip ci], so a
  # separate push-triggered workflow would not fire).
  deploy-pages:
    needs: check-jobs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download scraper output
        uses: actions/download-artifact@v4
        with:
          name: daily-jobs-report
          path: artifact

      - name: Assemble site directory
        run: |
          mkdir -p _site
          cp -r web_ui/. _site/
          cp artifact/scraped_jobs.json _site/scraped_jobs.json
          cp artifact/jobs_report.pdf   _site/jobs_report.pdf
          echo "Assembled site:" && ls -la _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
