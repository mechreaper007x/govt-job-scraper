name: Daily Job Portal Check

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC (11:30 AM IST) daily
  workflow_dispatch:      # Allows manual trigger for testing

permissions:
  contents: write         # Required to commit state.json back to the repo

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run all job scrapers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          SCRAPER_PDF_SCAN: '1'
          SCALE_CRAWL: '1'
        run: python -m scraper.main --scale-all

      - name: Generate PDF Report
        run: python generate_pdf.py

      - name: Upload PDF Report
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-report
          path: |
            jobs_report.pdf
            scraped_jobs.json
          retention-days: 7

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json scraped_jobs.json jobs_report.pdf all_relevant_jobs.md || true
          # Commit only if there are changes to the tracked files
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update state and reports [skip ci]" && git push)
