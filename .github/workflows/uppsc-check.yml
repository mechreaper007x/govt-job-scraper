name: Daily UPPSC Check

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC (11:30 AM IST) daily
  workflow_dispatch:      # Allows manual trigger for testing

permissions:
  contents: write         # Required to commit state.json back to the repo

jobs:
  check-uppsc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run UPPSC scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python -m scraper.main --uppsc

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Commit only if there are changes to state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update state.json (uppsc) [skip ci]" && git push)
