name: SPA Scraper Test

on:
  schedule:
    - cron: '30 6 * * 1'  # 06:30 UTC every Monday (12:00 PM IST)
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: read

jobs:
  test-spa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Test SPA scraper on DRDO (Playwright)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "
          import sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          from scraper.crawler import GovJobCrawler

          crawler = GovJobCrawler()
          result = crawler.run_scrape(orgs=['drdo_spa'])
          postings = result.get('drdo_spa')

          if postings is None:
              print('FAIL: drdo_spa returned None')
              sys.exit(1)
          if len(postings) == 0:
              print('FAIL: drdo_spa returned 0 listings')
              sys.exit(1)

          print(f'PASS: drdo_spa found {len(postings)} listings')
          for p in postings[:3]:
              print(f'  - {p[\"title\"][:80]}')
          "

      - name: Test SPA scraper on RRB (Playwright + static fallback)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "
          import sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          from scraper.crawler import GovJobCrawler

          crawler = GovJobCrawler()
          result = crawler.run_scrape(orgs=['rrb'])
          postings = result.get('rrb')

          if postings is None:
              print('FAIL: rrb returned None')
              sys.exit(1)

          print(f'PASS: rrb returned {len(postings)} listings (SPA or static fallback)')
          for p in postings[:3]:
              print(f'  - {p[\"title\"][:80]}')
          "

      - name: Test stealth mode (navigator.webdriver patch)
        id: stealth-test
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "
          import sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          from scraper.spa_scraper import _ensure_playwright
          from playwright_stealth import Stealth

          browser = _ensure_playwright()
          ctx = browser.new_context()
          page = ctx.new_page()
          Stealth().apply_stealth_sync(page)
          page.goto('data:text/html,<html><body></body></html>')
          webdriver_val = page.evaluate('() => navigator.webdriver')
          ctx.close()

          if webdriver_val is None or webdriver_val is False:
              print(f'PASS: navigator.webdriver = {webdriver_val} (stealth active)')
          else:
              print(f'FAIL: navigator.webdriver = {webdriver_val} (stealth not working)')
              sys.exit(1)
          "

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "
          import os, requests, json
          from datetime import datetime, timezone

          webhook = os.environ.get('DISCORD_WEBHOOK_URL')
          if not webhook:
              print('No DISCORD_WEBHOOK_URL configured, skipping notification')
              exit(0)

          run_url = f\"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\"
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          embed = {
              'title': '🚨 SPA Scraper Test Failed',
              'description': (
                  f'SPA test workflow failed in CI.\n\n'
                  f'**Possible causes:**\n'
                  f'• Government site changed its HTML structure\n'
                  f'• Site is temporarily down or blocking\n'
                  f'• Playwright/Chromium version incompatibility\n'
                  f'• Anti-bot detection upgraded\n\n'
                  f'[View workflow run]({run_url})'
              ),
              'color': 16711680,  # Red
              'footer': {'text': f'SPA Test • {now}'},
              'url': run_url,
          }

          payload = {'embeds': [embed]}
          r = requests.post(webhook, json=payload, timeout=10)
          r.raise_for_status()
          print(f'Discord failure notification sent')
          "
